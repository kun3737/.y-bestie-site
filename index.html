<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Bestie</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; text-align: center;
        }
        .container {
            background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            z-index: 10; width: 85%; max-width: 450px; border: 3px solid #ff4081; animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        h1 { color: #d81b60; font-size: 20px; line-height: 1.6; margin-bottom: 20px; }
        input[type="text"], textarea { width: 90%; padding: 12px; margin: 15px 0; border: 2px solid #ff80ab; border-radius: 12px; outline: none; font-size: 14px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn {
            background: #ff4081; color: white; border: none; padding: 12px 25px;
            border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn-alt { background: #64b5f6; }
        .hidden { display: none; }
        #userImage { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid #ff4081; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .flower { position: fixed; top: -10%; z-index: 5; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="setup" class="container">
        <h1>Welcome Bestie! ✨</h1>
        <input type="text" id="nameInput" placeholder="Enter your beautiful name...">
        <p style="font-size: 13px; color: #d81b60;">Select a cute picture of yourself:</p>
        <input type="file" id="photoInput" accept="image/*" style="font-size: 12px; margin-bottom: 15px;">
        <button class="btn" onclick="startJourney()">Let's Start the Journey ➡️</button>
    </div>

    <div id="questionBox" class="container hidden">
        <h1 id="questionText"></h1>
        
        <div id="answerArea" class="hidden">
            <textarea id="userInputArea" rows="3" placeholder="Write your answer here..."></textarea>
            <br>
            <button class="btn" onclick="submitAnswer()">Submit & Next ➡️</button>
        </div>

        <div class="btn-group" id="btnGroup">
            <button class="btn" onclick="handleYes()">Yes! ✅</button>
            <button class="btn btn-alt" onclick="handleNo()">No ❌</button>
        </div>

        <button class="btn hidden" id="noNextBtn" onclick="showNextQuestion()" style="margin-top:20px;">Okay, Next Question! ➡️</button>
    </div>

    <div id="step-final" class="container hidden">
        <img id="userImage" src="" alt="Bestie">
        <h1 id="finalMessage"></h1>
        <p style="color: #ff4081; font-weight: bold; font-size: 24px;">Best Friend Forever! ♾️</p>
    </div>

    <script>
        let userName = "";
        let currentQ = 0;

        const questions = [
            { q: "Do you know how special you are to me?", no: "You are as special to me as Teddy is to Mr. Bean! You can ask the whole world!" },
            { q: "Am I at the top of your favorite person list?", no: "It's okay! You'll always be at the top of mine, because friendship is about heart, not rankings." },
            { q: "Do you think you can hide any secrets from me?", no: "Exactly! Because your eyes tell the truth, and I'm an expert at reading your face." },
            { q: "Will we still be talking like this when we are 80 years old?", no: "True! We won't be talking, we'll be laughing loudly at each other's missing teeth!" },
            { q: "If you find a better friend, will you forget me?", no: "That's what I wanted to hear! Anyway, you won't find a 'unique piece' like me anywhere else." },
            { q: "Do you trust me more than yourself?", no: "That's fine too, at least one of us is smart enough not to trust me!" },
            { q: "If I call you at 3 AM, will you be angry?", no: "You might be angry, but you'll definitely pick up. That's what true friendship is." },
            { q: "Can you fix my sad mood in just one minute?", no: "One minute might be less, but just you being there is enough to make me forget all my sadness." },
            { q: "Would you share your favorite food with me?", no: "Good that you were honest! But remember, I'm going to steal from your plate anyway." },
            { q: "Would you go on a long trip with me without any plans?", no: "No problem! We'll travel the whole world just by sitting at home and talking. I just need your company." }
        ];

        function startJourney() {
            userName = document.getElementById('nameInput').value;
            const photoFile = document.getElementById('photoInput').files[0];
            if(!userName) { alert("Hey! Please enter your name first!"); return; }
            if(photoFile) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('userImage').src = e.target.result;
                reader.readAsDataURL(photoFile);
            }
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('questionBox').classList.remove('hidden');
            showNextQuestion();
        }

        function showNextQuestion() {
            if(currentQ < questions.length) {
                document.getElementById('questionText').innerText = questions[currentQ].q;
                document.getElementById('btnGroup').classList.remove('hidden');
                document.getElementById('answerArea').classList.add('hidden');
                document.getElementById('noNextBtn').classList.add('hidden');
                document.getElementById('userInputArea').value = "";
                currentQ++;
            } else {
                showFinal();
            }
        }

        function handleYes() {
            document.getElementById('btnGroup').classList.add('hidden');
            document.getElementById('answerArea').classList.remove('hidden');
            document.getElementById('questionText').innerText = "Aww! Then please explain a little... ✨";
        }

        function submitAnswer() {
            const val = document.getElementById('userInputArea').value;
            if(!val) { alert("Please write something, bestie!"); return; }
            showNextQuestion();
        }

        function handleNo() {
            document.getElementById('questionText').innerText = questions[currentQ-1].no;
            document.getElementById('btnGroup').classList.add('hidden');
            document.getElementById('noNextBtn').classList.remove('hidden');
        }

        function showFinal() {
            document.getElementById('questionBox').classList.add('hidden');
            document.getElementById('step-final').classList.remove('hidden');
            document.getElementById('finalMessage').innerText = "Yayyy! Thank you so much, " + userName + "! ❤️";
            celebrate();
        }

        function celebrate() {
            const icons = ['🌸', '🌹', '💖', '✨', '🧸', '🍭'];
            for(let i=0; i<80; i++) {
                setTimeout(() => {
                    const f = document.createElement('div');
                    f.classList.add('flower');
                    f.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                    f.style.left = Math.random() * 100 + "vw";
                    f.style.fontSize = Math.random() * 20 + 20 + "px";
                    f.style.animationDuration = Math.random() * 3 + 2 + "s";
                    document.body.appendChild(f);
                    setTimeout(() => f.remove(), 5000);
                }, i * 60);
            }
        }
    </script>
</body>
</html>
