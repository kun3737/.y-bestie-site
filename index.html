<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Bestie ✨</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center;
        }
        .container {
            background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 85%; max-width: 400px; border: 2px solid #ff4081; animation: pop 0.3s ease-out;
        }
        @keyframes pop { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
        h1 { color: #d81b60; font-size: 18px; margin-bottom: 15px; }
        input[type="text"], textarea { width: 90%; padding: 10px; margin: 8px 0; border: 1.5px solid #ff80ab; border-radius: 10px; outline: none; font-size: 14px; }
        .btn-group { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
        .btn { background: #ff4081; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-alt { background: #64b5f6; }
        .hidden { display: none; }
        #userImage { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid #ff4081; margin-bottom: 10px; }
        
        .result-paper {
            background: #fffdf0; padding: 15px; border: 1.5px dashed #ff80ab; border-radius: 12px;
            text-align: left; font-size: 12px; margin: 10px 0; max-height: 350px; overflow-y: auto;
        }
        .result-item { margin-bottom: 8px; border-bottom: 1px solid #ffebee; padding-bottom: 4px; }
        .result-q { font-weight: bold; color: #d81b60; }
        .result-a { color: #333; }
        .flower { position: fixed; top: -10%; z-index: 5; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="setup" class="container">
        <h1>Bestie's Special Entry! ✨</h1>
        <input type="text" id="nameInput" placeholder="Enter your name...">
        <input type="text" id="instaInput" placeholder="Your Instagram ID (optional)">
        <p style="font-size: 11px; color: #d81b60;">Upload your profile pic:</p>
        <input type="file" id="photoInput" accept="image/*" style="font-size: 10px; margin-bottom: 10px;">
        <button class="btn" onclick="startJourney()">Let's Go! ➡️</button>
    </div>

    <div id="questionBox" class="container hidden">
        <h1 id="questionText"></h1>
        <div id="answerArea" class="hidden">
            <textarea id="userInputArea" rows="2" placeholder="Tell me why..."></textarea>
            <br>
            <button class="btn" onclick="submitAnswer()">Next ➡️</button>
        </div>
        <div class="btn-group" id="btnGroup">
            <button class="btn" onclick="handleResponse('Yes')">Yes! ✅</button>
            <button class="btn btn-alt" onclick="handleResponse('No')">No ❌</button>
        </div>
        <button class="btn hidden" id="noNextBtn" onclick="showNextQuestion()" style="margin-top:15px;">Next Question ➡️</button>
    </div>

    <div id="step-final" class="container hidden">
        <img id="userImage" src="" alt="Bestie">
        <h2 id="finalTitle" style="color: #d81b60; margin: 2px; font-size: 16px;"></h2>
        <p id="instaDisplay" style="font-size: 11px; color: #666; margin-bottom: 5px;"></p>
        <div class="result-paper" id="paperContent"></div>
        <p style="color: #ff4081; font-weight: bold; font-size: 13px;">📸 Please take a screenshot & send it to me!</p>
        <p style="color: #ff4081; font-weight: bold; font-size: 18px; margin: 5px;">BFF Forever! ♾️</p>
    </div>

    <script>
        let currentQ = 0;
        let responses = [];
        const questions = [
            { q: "Do you know how special you are to me?", no: "You are as special to me as Teddy is to Mr. Bean!" },
            { q: "Am I at the top of your favorite person list?", no: "Friendship is about heart, not rankings!" },
            { q: "Do you think you can hide any secrets from me?", no: "Your eyes always tell the truth!" },
            { q: "Will we still be talking at age 80?", no: "We'll be laughing at our missing teeth!" },
            { q: "If you find a better friend, will you forget me?", no: "You won't find a 'unique piece' like me anywhere!" },
            { q: "Do you trust me more than yourself?", no: "At least one of us is smart enough!" },
            { q: "If I call at 3 AM, will you be angry?", no: "You'll be angry, but you'll definitely pick up!" },
            { q: "Can you fix my sad mood in one minute?", no: "Just you being there is enough." },
            { q: "Would you share your favorite food with me?", no: "I'll just steal from your plate anyway!" },
            { q: "Would you go on a trip with me without plans?", no: "We'll travel the world through our stories." }
        ];

        function startJourney() {
            const name = document.getElementById('nameInput').value;
            if(!name) { alert("Please enter your name!"); return; }
            const photoFile = document.getElementById('photoInput').files[0];
            if(photoFile) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('userImage').src = e.target.result;
                reader.readAsDataURL(photoFile);
            }
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('questionBox').classList.remove('hidden');
            showNextQuestion();
        }

        function showNextQuestion() {
            if(currentQ < questions.length) {
                document.getElementById('questionText').innerText = questions[currentQ].q;
                document.getElementById('btnGroup').classList.remove('hidden');
                document.getElementById('answerArea').classList.add('hidden');
                document.getElementById('noNextBtn').classList.add('hidden');
                currentQ++;
            } else { showFinal(); }
        }

        function handleResponse(type) {
            if(type === 'Yes') {
                document.getElementById('btnGroup').classList.add('hidden');
                document.getElementById('answerArea').classList.remove('hidden');
                document.getElementById('questionText').innerText = "Explain why? ✨";
            } else {
                responses.push({ q: questions[currentQ-1].q, a: "No - " + questions[currentQ-1].no });
                document.getElementById('questionText').innerText = questions[currentQ-1].no;
                document.getElementById('btnGroup').classList.add('hidden');
                document.getElementById('noNextBtn').classList.remove('hidden');
            }
        }

        function submitAnswer() {
            const val = document.getElementById('userInputArea').value;
            if(!val) { alert("Please write something!"); return; }
            responses.push({ q: questions[currentQ-1].q, a: "Yes: " + val });
            document.getElementById('userInputArea').value = "";
            showNextQuestion();
        }

        function showFinal() {
            document.getElementById('questionBox').classList.add('hidden');
            document.getElementById('step-final').classList.remove('hidden');
            document.getElementById('finalTitle').innerText = document.getElementById('nameInput').value + "'s Report";
            const insta = document.getElementById('instaInput').value;
            if(insta) document.getElementById('instaDisplay').innerText = "Insta: @" + insta;
            const paper = document.getElementById('paperContent');
            responses.forEach((item, index) => {
                paper.innerHTML += `<div class="result-item"><div class="result-q">${index+1}. ${item.q}</div><div class="result-a">Ans: ${item.a}</div></div>`;
            });
            celebrate();
        }

        function celebrate() {
            const icons = ['🌸', '💖', '✨'];
            for(let i=0; i<40; i++) {
                setTimeout(() => {
                    const f = document.createElement('div');
                    f.classList.add('flower');
                    f.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                    f.style.left = Math.random() * 100 + "vw";
                    f.style.animationDuration = Math.random() * 3 + 2 + "s";
                    document.body.appendChild(f);
                    setTimeout(() => f.remove(), 5000);
                }, i * 150);
            }
        }
    </script>
</body>
</html>
